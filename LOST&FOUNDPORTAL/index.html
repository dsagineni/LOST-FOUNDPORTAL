<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost & Found Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <h1>✨ Lost & Found Portal</h1>
    <nav>
        <a onclick="showPage('home')">Home</a>
        <a onclick="showPage('lost')">Lost</a>
        <a onclick="showPage('found')">Found</a>
    </nav>
</header>

<!-- 🔔 BELL NOTIFICATION -->
<div class="bell-container" onclick="toggleNotifications()">
    <div class="bell">🔔 <span id="badge" class="badge">0</span></div>
    <div id="notificationBox" class="notification-box"></div>
</div>

<!-- HOME -->
<section id="homePage" class="page active">
    <div class="card hero">
        <h2>Welcome 👋</h2>
        <p>Helping students recover lost belongings securely and efficiently.</p>

        <button onclick="showPage('lost')">Report Lost</button>
        <button onclick="showPage('found')">Report Found</button>
    </div>

    <div class="card">
        <h3>📢 Recent Updates</h3>
        <div id="recentItems"></div>
    </div>
</section>

<!-- LOST -->
<section id="lostPage" class="page">
    <div class="card">
        <h2>Report Lost Item</h2>
        <form id="lostForm">
            <input type="text" id="lostItem" placeholder="Item Name" required>
            <textarea id="lostDesc" placeholder="Description"></textarea>
            <button type="submit">Submit</button>
        </form>
    </div>

    <div class="card">
        <h2>Lost Items</h2>
        <div id="lostList"></div>
    </div>
</section>

<!-- FOUND -->
<section id="foundPage" class="page">
    <div class="card">
        <h2>Report Found Item</h2>
        <form id="foundForm">
            <input type="text" id="foundItem" placeholder="Item Name" required>

            <input type="text" class="q" placeholder="Question 1" required>
            <input type="text" class="q" placeholder="Question 2" required>
            <input type="text" class="q" placeholder="Question 3" required>
            <input type="text" class="q" placeholder="Question 4" required>
            <input type="text" class="q" placeholder="Question 5" required>

            <button type="submit">Submit</button>
        </form>
    </div>

    <div class="card">
        <h2>Found Items</h2>
        <div id="foundList"></div>
    </div>
</section>

<footer>
    <p>© 2026 Lost & Found Portal</p>
</footer>

<script src="script.js"></script>
</body>
</html>
