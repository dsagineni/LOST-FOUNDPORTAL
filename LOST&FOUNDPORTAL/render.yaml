services:
  - type: web
    name: lost-found-portal
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/app.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: FLASK_DEBUG
        value: "0"
      - key: PORTAL_DATABASE_PATH
        value: /var/data/portal.db
    disk:
      name: portal-data
      mountPath: /var/data
      sizeGB: 1
